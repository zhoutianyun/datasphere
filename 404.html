<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面不存在</title>
<style>
:root{--bg:#161b24;--card:#1e2431;--text:#eef1f6;--dim:#a8b0c4;--accent:#5b8def}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.w{text-align:center;max-width:480px}
h1{font-size:72px;font-weight:700;color:var(--accent);margin-bottom:8px}
p{font-size:16px;color:var(--dim);margin-bottom:24px;line-height:1.8}
a{display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-size:15px;font-weight:500;transition:background .2s}
a:hover{background:#4a7de0}
</style></head>
<body><div class="w"><h1>404</h1><p>找不到这个页面<br>可能是链接错误或页面已被移除</p><a href="../index.html">&#8592; 返回首页</a></div></body>
</html>
