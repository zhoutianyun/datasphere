<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职业规划诊断 · 周添运</title>
<style>
:root{--bg:#161b24;--card:#1e2431;--text:#eef1f6;--dim:#a8b0c4;--border:#2c3347;--accent:#5b8def}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}a:hover{color:#8aafff}
nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(22,27,36,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:center}
nav .inner{width:100%;max-width:720px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px;color:var(--text)}
nav .logo span{color:var(--accent)}
nav .back{font-size:14px;font-weight:500;color:var(--dim);display:flex;align-items:center;gap:4px;transition:color .2s}
nav .back:hover{color:var(--text)}
.wrap{max-width:640px;margin:0 auto;padding:80px 24px 60px}
h1{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-.02em}
.sub{font-size:14px;color:var(--dim);margin-bottom:28px;line-height:1.8}
.sl{font-size:13px;font-weight:600;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sl .st{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.icard{padding:16px 12px;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;text-align:center;transition:all .25s;position:relative}
.icard:hover{border-color:var(--dim)}
.icard.on{border-color:var(--accent);background:rgba(91,141,239,.08)}
.icard .ico{font-size:28px;margin-bottom:6px}
.icard .nm{font-size:14px;font-weight:600;margin-bottom:2px}
.icard .de{font-size:11px;color:var(--dim)}
.icard .chk{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .25s}
.icard.on .chk{border-color:var(--accent);background:var(--accent);color:#fff}
.fa{display:none;margin-bottom:24px}.fa.sh{display:block}
.fg{margin-bottom:14px}
.fg lb{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--dim)}
.fg input,.fg select{padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.fg .er{font-size:12px;color:#e74c3c;margin-top:4px;display:none}
.fg.er input,.fg.er select{border-color:#e74c3c}
.fg.er .er{display:block}
.btn{padding:12px 28px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:8px;margin-bottom:28px}
.bp{background:var(--accent);color:#fff}
.bp:hover{background:#4a7de0;transform:translateY(-1px)}
.bp:disabled{background:var(--border);color:var(--dim);cursor:not-allowed;transform:none}
.bp .sp{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.bp.go .sp{display:inline-block}
.bp.go .lb{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.ra{display:none;animation:fi .4s ease}.ra.sh{display:block}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ipc{padding:20px;border:1px solid var(--border);border-radius:10px;background:linear-gradient(135deg,rgba(91,141,239,.08),rgba(167,139,250,.05));margin-bottom:24px}
.ipc h3{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.ipc h3 sp{color:var(--accent)}
.ipc p{font-size:13px;color:var(--dim);line-height:1.9}
.rh{font-size:13px;font-weight:600;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rh .ct{font-size:12px;color:var(--dim);background:var(--card);padding:2px 10px;border-radius:12px}
.tl{list-style:none}
.ti{padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:all .2s}
.ti.dn{opacity:.6}
.ti.dn .tt{text-decoration:line-through;color:var(--dim)}
.cb{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;appearance:none;-webkit-appearance:none}
.cb:checked{border-color:var(--accent);background:var(--accent)}
.cb:checked::after{content:"✓";color:#fff;font-size:13px;font-weight:700;line-height:1}
.tt{font-size:14px;line-height:1.6;flex:1;color:var(--text);cursor:pointer}
.br{padding:8px 20px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px}
.br:hover{border-color:var(--dim);color:var(--text)}
footer{text-align:center;padding:24px;color:var(--dim);font-size:12px;margin-top:40px}
@media(max-width:600px){.ig{grid-template-columns:1fr}.wrap{padding:72px 16px 40px}}
</style>
</head>
<body>
<nav><div class="inner"><span class="logo">&#9670; <span>Data</span>Sphere</span><a href="../index.html" class="back">&#8592; 返回主页</a></div></nav>

<div class="wrap">
<h1>职业规划诊断</h1>
<p class="sub">我是周添运，一名数据科学专业的学生。我帮你梳理职业方向、发现技能差距，并给出有针对性的简历优化和成长建议。</p>

<div class="sl"><span class="st">1</span> 你的身份</div>
<div class="ig" id="idG">
  <div class="icard" data-id="s" onclick="pi('s')"><div class="chk">&#10003;</div><div class="ico">&#127891;</div><div class="nm">在校生</div><div class="de">还在读书，想提前规划</div></div>
  <div class="icard" data-id="j" onclick="pi('j')"><div class="chk">&#10003;</div><div class="ico">&#128188;</div><div class="nm">求职者</div><div class="de">正在找工作/准备跳槽</div></div>
  <div class="icard" data-id="c" onclick="pi('c')"><div class="chk">&#10003;</div><div class="ico">&#128640;</div><div class="nm">转行者</div><div class="de">想换行业重新开始</div></div>
</div>

<div class="fa" id="fA">
  <div class="sl"><span class="st">2</span> 基本信息</div>
  <div class="fg" id="gn"><lb>你的名字</lb><input type="text" id="n" placeholder="请输入你的名字"><div class="er">请填写你的名字</div></div>
  <div id="xf"></div>
  <button class="btn bp" id="gb" onclick="go()"><span class="sp"></span><span class="lb">生成我的行动清单</span></button>
</div>

<div class="ra" id="rA">
  <div class="sl"><span class="st">&#10003;</span> 为你生成的方案</div>
  <div class="ipc"><h3>&#9670; 来自 <sp>周添运</sp> 的分析</h3><p id="ipT">你好！根据你的情况，我做了以下分析和建议。</p></div>
  <div class="rh">行动清单 <span class="ct" id="tC">0 项</span></div>
  <ul class="tl" id="tL"></ul>
  <button class="br" onclick="rs()">&#8634; 重新开始</button>
</div>

<footer>&copy; 2026 DataSphere</footer>
</div>

<script>
var sid = "";
var fc = {
  s: [{id:"g",lb:"当前年级",tp:"sel",op:["大一","大二","大三","大四","研一","研二","研三"],er:"请选择年级"},{id:"t",lb:"目标岗位",tp:"txt",pl:"如：数据分析师",er:"请填写目标岗位"}],
  j: [{id:"y",lb:"工作年限",tp:"num",pl:"如：3",er:"请填写工作年限"},{id:"i",lb:"目标行业",tp:"txt",pl:"如：互联网、金融",er:"请填写目标行业"}],
  c: [{id:"o",lb:"原行业",tp:"txt",pl:"如：传统制造业",er:"请填写原行业"},{id:"d",lb:"目标方向",tp:"txt",pl:"如：数据分析",er:"请填写目标方向"}]
};
var cd = {
  s: function(d){return ['调研目标岗位「'+d.t+'」的招聘要求，列出前 5 条高频技能','对照招聘要求梳理自己已具备和欠缺的技能，形成差距清单','制定学习计划，优先补齐权重最高的 2 项技能','寻找 1 段与目标岗位相关的实习或项目经历','用 STAR 法则重写简历中的项目经历，突出量化成果','在招聘平台完善个人资料','每周投入 2 小时学习行业知识','找一位目标岗位的在职人士做信息访谈']},
  j: function(d){return ['针对「'+d.i+'」行业筛选 10 家目标公司','更新简历：将过去 '+d.y+' 年的经历按成果+数据格式重写','为每家目标公司准备 1 份定制求职信','准备 3 个面试故事（成功/失败/领导力），用 STAR 打磨','梳理自己最擅长的 3 项可迁移技能','制定投递时间线，给自己设一个 deadline','每天 15 分钟浏览行业资讯','找 2-3 位前辈做模拟面试']},
  c: function(d){return ['分析从「'+d.o+'」到「'+d.d+'」的可迁移技能，列出至少 3 项','调研目标方向的入门门槛和核心技能，评估转型难度','制定 3-6 个月转型学习路线图','做一个与「'+d.d+'」相关的 demo 项目','在简历中突出转型相关的学习成果','通过线上课程补足硬技能短板','找 3 位成功转型的前辈做信息访谈','更新招聘平台简介，突出转型方向和已有优势']}
};

function pi(id){
  sid = id;
  document.querySelectorAll(".icard").forEach(function(c){c.classList.toggle("on",c.dataset.id===id)});
  var el = document.getElementById("xf");
  var cfg = fc[id];
  el.innerHTML = "";
  cfg.forEach(function(f){
    var d = document.createElement("div");
    d.className = "fg"; d.id = "f"+f.id;
    var l = document.createElement("lb"); l.textContent = f.lb; d.appendChild(l);
    var inp;
    if(f.tp === "sel"){
      inp = document.createElement("select"); inp.id = f.id;
      var ph = document.createElement("option"); ph.value=""; ph.textContent="请选择"; ph.disabled=true; ph.selected=true;
      inp.appendChild(ph);
      f.op.forEach(function(o){var opt=document.createElement("option"); opt.value=o; opt.textContent=o; inp.appendChild(opt)});
    } else {
      inp = document.createElement("input"); inp.type = f.tp; inp.id = f.id;
      if(f.pl) inp.placeholder = f.pl;
    }
    d.appendChild(inp);
    var er = document.createElement("div"); er.className = "er"; er.textContent = f.er; d.appendChild(er);
    el.appendChild(d);
  });
  document.getElementById("fA").classList.add("sh");
  document.getElementById("rA").classList.remove("sh");
  ce();
}

function gv(id){var e=document.getElementById(id);return e?e.value.trim():""}

function va(){
  var ok=true; ce();
  if(!gv("n")){document.getElementById("gn").classList.add("er");ok=false}
  var cfg=fc[sid];
  if(cfg) cfg.forEach(function(f){if(!gv(f.id)){document.getElementById("f"+f.id).classList.add("er");ok=false}});
  return ok;
}

function ce(){document.querySelectorAll(".fg.er").forEach(function(e){e.classList.remove("er")})}

function go(){
  if(!sid){
    document.querySelectorAll(".icard").forEach(function(c){c.style.borderColor="#e74c3c"});
    setTimeout(function(){document.querySelectorAll(".icard").forEach(function(c){c.style.borderColor=""})},2000);
    return;
  }
  if(!va()) return;
  var b = document.getElementById("gb");
  b.classList.add("go"); b.disabled = true;
  setTimeout(function(){
    var d={}; d.n=gv("n"); d.id=sid;
    var cfg=fc[sid]; if(cfg) cfg.forEach(function(f){d[f.id]=gv(f.id)});
    var fn=cd[sid]; var items=fn?fn(d):["确认基本信息","制定计划","开始行动"];
    document.getElementById("rA").classList.add("sh");
    document.getElementById("rA").scrollIntoView({behavior:"smooth",block:"start"});
    document.getElementById("ipT").textContent = "你好"+(d.n?"，"+d.n:"")+"！我是周添运，一名数据科学专业的学生。根据你的情况，我用数据分析的思维拆解了你的目标，整理出以下 "+items.length+" 条行动建议。每完成一项可以勾掉，追踪你的进度。";
    var ul = document.getElementById("tL"); ul.innerHTML = "";
    items.forEach(function(t,i){
      var li = document.createElement("li"); li.className = "ti";
      li.innerHTML = '<input type="checkbox" class="cb" id="tk-'+i+'" onchange="this.parentNode.classList.toggle(\'dn\')"><label class="tt" for="tk-'+i+'">'+t+'</label>';
      ul.appendChild(li);
    });
    document.getElementById("tC").textContent = items.length+" 项";
    b.classList.remove("go"); b.disabled = false;
  }, 800);
}

function rs(){
  sid = "";
  document.querySelectorAll(".icard").forEach(function(c){c.classList.remove("on")});
  document.getElementById("fA").classList.remove("sh");
  document.getElementById("rA").classList.remove("sh");
  document.getElementById("n").value = "";
  document.getElementById("xf").innerHTML = "";
  ce(); document.getElementById("gb").classList.remove("go"); document.getElementById("gb").disabled = false;
}
</script>
</body>
</html>
